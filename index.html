<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Casal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .riscado-visual { opacity: 0.2; filter: grayscale(1); text-decoration: line-through; }
        .pago-status { text-decoration: line-through; opacity: 0.5; }
        input { font-size: 16px !important; }
        body { -webkit-tap-highlight-color: transparent; background-color: #050505; user-select: none; }
        .card-item { transition: all 0.2s; }
        #modal-edit { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .flash-success { animation: flash 0.4s ease; }
        @keyframes flash { 0% { background-color: #050505; } 50% { background-color: #064e3b; } 100% { background-color: #050505; } }
    </style>
</head>
<body id="corpo" class="font-sans antialiased text-slate-200">

    <div id="modal-edit" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="bg-zinc-900 w-full max-w-[340px] p-8 rounded-[3rem] border border-zinc-800 shadow-2xl">
            <h3 class="text-white font-black text-xl mb-6 text-center uppercase">Editar Item</h3>
            <input type="text" id="edit-nome" class="w-full mb-3 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl outline-none text-white text-base">
            <input type="number" id="edit-valor" inputmode="decimal" step="0.01" class="w-full mb-6 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl text-white font-bold text-base">
            <div class="flex gap-3">
                <button onclick="fecharModal()" class="flex-1 bg-zinc-800 text-zinc-400 py-4 rounded-2xl font-bold text-xs uppercase">Sair</button>
                <button onclick="confirmarEdicao()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold text-xs uppercase">Salvar</button>
            </div>
        </div>
    </div>

    <div id="welcome-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-zinc-900 p-10 rounded-[3rem] border border-zinc-800 w-full max-w-[340px] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-white mb-2">Olá! 👋</h1>
            <p class="text-zinc-500 text-sm mb-10">Finanças do Casal</p>
            <div class="space-y-4">
                <button onclick="irApp()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg active:scale-95 transition-all">Continuar</button>
                <button onclick="prepararNovoMes()" class="w-full bg-zinc-800 text-white py-5 rounded-2xl font-bold border border-zinc-700 active:scale-95 transition-all">Novo Mês</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden w-full max-w-[450px] mx-auto px-4 pt-4 pb-20">
        <div class="bg-indigo-700 p-8 rounded-[2.5rem] shadow-2xl text-white mb-6">
            <p class="text-indigo-200 text-[10px] font-bold uppercase text-center mb-1">Saldo (Receita - Despesas)</p>
            <h2 id="saldo-total" class="text-5xl font-black mb-6 text-center tracking-tighter">R$ 0,00</h2>
            <div class="flex justify-between border-t border-white/10 pt-5">
                <div class="w-1/2">
                    <p class="text-white/50 text-xs font-bold uppercase mb-1">Receita Disponível</p>
                    <p id="resumo-disponivel" class="text-emerald-300 text-xl font-black">R$ 0,00</p>
                </div>
                <div class="text-right w-1/2">
                    <p class="text-white/50 text-xs font-bold uppercase mb-1">Total Despesas</p>
                    <p id="resumo-despesas" class="text-rose-300 text-xl font-black">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div class="bg-zinc-900 p-6 rounded-[2.5rem] border border-zinc-800 mb-8 shadow-xl">
            <input type="text" id="desc" placeholder="Nome" class="w-full mb-3 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl outline-none text-white text-base">
            <input type="number" id="valor" inputmode="decimal" step="0.01" placeholder="Valor R$" class="w-full mb-4 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl text-white font-bold text-base">
            <div class="flex gap-3">
                <button onclick="salvar('receita')" class="flex-1 bg-emerald-600 text-white py-5 rounded-2xl font-black text-xs uppercase">+ Receita</button>
                <button onclick="salvar('despesa')" class="flex-1 bg-rose-600 text-white py-5 rounded-2xl font-black text-xs uppercase">- Despesa</button>
            </div>
        </div>

        <div id="lista" class="space-y-4 mb-12"></div>
    </div>

    <script>
        const dadosPadrao = [
            { id: 1, nome: "Financiamento", valor: 1800, tipo: "despesa", pago: false, riscado: false },
            { id: 2, nome: "Condominio", valor: 218, tipo: "despesa", pago: false, riscado: false },
            { id: 3, nome: "Luz", valor: 250, tipo: "despesa", pago: false, riscado: false },
            { id: 4, nome: "Água", valor: 120, tipo: "despesa", pago: false, riscado: false },
            { id: 5, nome: "Internet", valor: 80, tipo: "despesa", pago: false, riscado: false },
            { id: 6, nome: "Perua", valor: 240, tipo: "despesa", pago: false, riscado: false },
            { id: 7, nome: "Celular", valor: 60, tipo: "despesa", pago: false, riscado: false },
            { id: 8, nome: "Diego", valor: 2000, tipo: "receita", pago: false, riscado: false },
            { id: 9, nome: "Elisa", valor: 3000, tipo: "receita", pago: false, riscado: false }
        ];

        let dadosAtuais = JSON.parse(localStorage.getItem('f_v17_at')) || [...dadosPadrao];
        let itemSendoEditado = null;
        let timerSegurar;

        function irApp() { 
            document.getElementById('welcome-screen').classList.add('hidden'); 
            document.getElementById('main-app').classList.remove('hidden'); 
            atualizar(); 
        }

        function toqueInicia(id) { timerSegurar = setTimeout(() => editarItem(id), 600); }
        function toqueTermina() { clearTimeout(timerSegurar); }

        function salvar(tipo) {
            const d = document.getElementById('desc'), v = document.getElementById('valor');
            const val = parseFloat(v.value);
            if (!d.value || isNaN(val)) return;
            dadosAtuais.push({ id: Date.now(), nome: d.value, valor: val, tipo, pago: false, riscado: false });
            d.value = ""; v.value = "";
            document.getElementById('corpo').classList.add('flash-success');
            setTimeout(() => document.getElementById('corpo').classList.remove('flash-success'), 400);
            persistir();
        }

        function alternarPago(id) {
            const i = dadosAtuais.find(x => x.id === id);
            if (i) { i.pago = !i.pago; persistir(); }
        }

        function alternarRiscado(id) {
            const i = dadosAtuais.find(x => x.id === id);
            if (i) { i.riscado = !i.riscado; persistir(); }
        }

        function editarItem(id) {
            const item = dadosAtuais.find(x => x.id === id);
            if (!item) return;
            itemSendoEditado = item;
            document.getElementById('edit-nome').value = item.nome;
            document.getElementById('edit-valor').value = item.valor;
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal-edit').classList.add('hidden'); }

        function confirmarEdicao() {
            if (itemSendoEditado) {
                itemSendoEditado.nome = document.getElementById('edit-nome').value;
                itemSendoEditado.valor = parseFloat(document.getElementById('edit-valor').value) || 0;
                persistir(); fecharModal();
            }
        }

        function apagar(id) { if(confirm("Apagar?")) { dadosAtuais = dadosAtuais.filter(x => x.id !== id); persistir(); } }

        function persistir() { 
            localStorage.setItem('f_v17_at', JSON.stringify(dadosAtuais)); 
            atualizar(); 
        }

        function atualizar() {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let recTotal = 0, despTotal = 0, despPagas = 0;

            const ordenados = [...dadosAtuais].sort((a,b) => a.tipo === 'receita' ? -1 : 1);

            ordenados.forEach(i => {
                const v = parseFloat(i.valor);
                if(i.tipo === 'receita') recTotal += v;
                else {
                    despTotal += v;
                    if(i.pago) despPagas += v;
                }

                const estiloClasse = i.riscado ? 'riscado-visual' : (i.pago ? 'pago-status' : '');
                const corValor = i.tipo === 'receita' ? 'text-emerald-400' : 'text-rose-400';
                
                lista.innerHTML += `
                    <div onmousedown="toqueInicia(${i.id})" onmouseup="toqueTermina()" ontouchstart="toqueInicia(${i.id})" ontouchend="toqueTermina()"
                         class="bg-zinc-900 p-5 rounded-[2rem] flex justify-between items-center border border-zinc-800/50 card-item ${estiloClasse}">
                        <div>
                            <p class="font-bold text-white text-base">${i.nome}</p>
                            <p class="font-black ${corValor} text-sm">R$ ${v.toFixed(2)}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="alternarRiscado(${i.id})" class="px-3 py-2 bg-zinc-800 text-zinc-400 rounded-xl text-[10px] font-bold">RISCAR</button>
                            ${i.tipo === 'despesa' ? `
                                <button onclick="alternarPago(${i.id})" class="px-4 py-2 rounded-xl font-bold text-[10px] border ${i.pago ? 'bg-emerald-500 text-white' : 'border-emerald-500 text-emerald-500'}">
                                    ${i.pago ? 'PAGO ✓' : 'PAGAR'}
                                </button>
                            ` : ''}
                            <button onclick="apagar(${i.id})" class="px-2 text-rose-900">✕</button>
                        </div>
                    </div>`;
            });

            const f = (n) => n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('saldo-total').innerText = f(recTotal - despTotal);
            document.getElementById('resumo-disponivel').innerText = f(recTotal - despPagas);
            document.getElementById('resumo-despesas').innerText = f(despTotal);
        }

        function prepararNovoMes() { if(confirm("Isso resetará os dados para o padrão. Continuar?")) { dadosAtuais = [...dadosPadrao]; persistir(); irApp(); } }
    </script>
</body>
</html>

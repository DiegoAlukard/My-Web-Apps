<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Finanças Casal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .riscado { text-decoration: line-through; opacity: 0.3; filter: grayscale(1); }
        input { font-size: 16px !important; }
        body { -webkit-tap-highlight-color: transparent; background-color: #050505; user-select: none; }
        .card-item:active { background-color: #111113; transform: scale(0.98); }
        #modal-edit { background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        /* Animação simples de confirmação */
        .flash-success { animation: flash 0.5s ease; }
        @keyframes flash { 0% { background-color: #050505; } 50% { background-color: #14532d; } 100% { background-color: #050505; } }
    </style>
</head>
<body id="corpo" class="font-sans antialiased text-slate-200">

    <div id="modal-edit" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="bg-zinc-900 w-full max-w-[340px] p-8 rounded-[3rem] border border-zinc-800 shadow-2xl">
            <h3 class="text-white font-black text-xl mb-6 text-center uppercase">Editar Item</h3>
            <input type="text" id="edit-nome" class="w-full mb-3 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl outline-none text-white text-base">
            <input type="number" id="edit-valor" inputmode="decimal" step="0.01" class="w-full mb-6 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl text-white font-bold text-base">
            <div class="flex gap-3">
                <button onclick="fecharModal()" class="flex-1 bg-zinc-800 text-zinc-400 py-4 rounded-2xl font-bold text-xs uppercase">Sair</button>
                <button onclick="confirmarEdicao()" class="flex-1 bg-indigo-600 text-white py-4 rounded-2xl font-bold text-xs uppercase">Salvar</button>
            </div>
        </div>
    </div>

    <div id="welcome-screen" class="flex flex-col items-center justify-center min-h-screen p-6">
        <div class="bg-zinc-900 p-10 rounded-[3rem] border border-zinc-800 w-full max-w-[340px] shadow-2xl text-center">
            <h1 class="text-4xl font-black text-white mb-2">Olá! 👋</h1>
            <div class="space-y-4 mt-8">
                <button onclick="irApp()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg">Continuar</button>
                <button onclick="prepararNovoMes()" class="w-full bg-zinc-800 text-white py-5 rounded-2xl font-bold border border-zinc-700">Novo Mês</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden w-full max-w-[450px] mx-auto px-4 pt-4 pb-20">
        <div class="bg-indigo-700 p-8 rounded-[2.5rem] shadow-2xl text-white mb-6">
            <p class="text-indigo-200 text-[10px] font-bold uppercase text-center mb-1">Saldo Disponível (Receitas - Pagos)</p>
            <h2 id="saldo-total" class="text-5xl font-black mb-6 text-center tracking-tighter">R$ 0,00</h2>
            <div class="flex justify-between border-t border-white/10 pt-5">
                <div>
                    <p class="text-white/50 text-[10px] font-bold uppercase">Entradas</p>
                    <p id="resumo-receitas" class="text-emerald-300 text-sm font-black">R$ 0,00</p>
                </div>
                <div class="text-right">
                    <p class="text-white/50 text-[10px] font-bold uppercase">Total Despesas</p>
                    <p id="resumo-despesas" class="text-rose-300 text-sm font-black">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div class="bg-zinc-900 p-6 rounded-[2.5rem] border border-zinc-800 mb-8 shadow-xl">
            <input type="text" id="desc" placeholder="Nome" class="w-full mb-3 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl outline-none text-white text-base">
            <input type="number" id="valor" inputmode="decimal" step="0.01" placeholder="Valor R$" class="w-full mb-4 p-5 bg-zinc-800 border border-zinc-700 rounded-2xl text-white font-bold text-base">
            <div class="flex gap-3">
                <button onclick="salvar('receita')" class="flex-1 bg-emerald-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest">+ Receita</button>
                <button onclick="salvar('despesa')" class="flex-1 bg-rose-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest">- Despesa</button>
            </div>
        </div>

        <div id="lista" class="space-y-4 mb-12"></div>

        <div id="secao-historico" class="pt-10 border-t border-zinc-900">
            <button onclick="fecharMesESalvar()" class="w-full bg-zinc-900 p-6 rounded-[2rem] border border-zinc-800 mb-6 text-white font-bold uppercase text-xs">Finalizar e Arquivar Mês</button>
            <div id="historico-meses" class="space-y-3"></div>
        </div>
    </div>

    <script>
        let dadosAtuais = JSON.parse(localStorage.getItem('f_v13_at')) || [];
        let hist = JSON.parse(localStorage.getItem('f_v13_hi')) || [];
        let itemSendoEditado = null;

        function irApp() { 
            document.getElementById('welcome-screen').classList.add('hidden'); 
            document.getElementById('main-app').classList.remove('hidden'); 
            atualizar(); 
        }

        function salvar(tipo) {
            const d = document.getElementById('desc'), v = document.getElementById('valor');
            const val = parseFloat(v.value);
            if (!d.value || isNaN(val)) return;

            dadosAtuais.push({ id: Date.now(), nome: d.value, valor: val, tipo, riscado: false });
            
            // Feedback e Limpeza
            d.value = ""; v.value = "";
            document.getElementById('corpo').classList.add('flash-success');
            setTimeout(() => document.getElementById('corpo').classList.remove('flash-success'), 500);
            
            persistir();
        }

        function marcarPago(id) {
            const i = dadosAtuais.find(x => x.id === id);
            if (i) {
                i.riscado = !i.riscado; 
                persistir();
            }
        }

        function editarItem(id) {
            const item = dadosAtuais.find(x => x.id === id);
            if (!item) return;
            itemSendoEditado = item;
            document.getElementById('edit-nome').value = item.nome;
            document.getElementById('edit-valor').value = item.valor;
            document.getElementById('modal-edit').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal-edit').classList.add('hidden'); }

        function confirmarEdicao() {
            if (itemSendoEditado) {
                itemSendoEditado.nome = document.getElementById('edit-nome').value;
                itemSendoEditado.valor = parseFloat(document.getElementById('edit-valor').value) || 0;
                persistir(); fecharModal();
            }
        }

        function apagar(id) { if(confirm("Apagar?")) { dadosAtuais = dadosAtuais.filter(x => x.id !== id); persistir(); } }

        function fecharMesESalvar() {
            const nome = prompt("Nome do mês:");
            if (!nome) return;
            let r=0, d=0;
            dadosAtuais.forEach(x => x.tipo==='receita' ? r+=x.valor : d+=x.valor);
            hist.unshift({ id: Date.now(), nome, receita: r, despesa: d });
            localStorage.setItem('f_v13_hi', JSON.stringify(hist));
            alert("Mês arquivado!");
            location.reload();
        }

        function persistir() { 
            localStorage.setItem('f_v13_at', JSON.stringify(dadosAtuais)); 
            atualizar(); 
        }

        function atualizar() {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            let receitasTotal = 0;
            let despesasTotal = 0;
            let despesasPagas = 0;

            dadosAtuais.forEach(i => {
                const valor = parseFloat(i.valor);
                if(i.tipo === 'receita') {
                    receitasTotal += valor;
                } else {
                    despesasTotal += valor;
                    if(i.riscado) despesasPagas += valor;
                }

                const corValor = i.tipo === 'receita' ? 'text-emerald-400' : 'text-rose-400';
                
                lista.innerHTML += `
                    <div class="bg-zinc-900 p-5 rounded-[2rem] flex justify-between items-center border border-zinc-800/50 card-item">
                        <div class="${i.riscado ? 'riscado' : ''}" onclick="editarItem(${i.id})">
                            <p class="font-bold text-white text-base">${i.nome}</p>
                            <p class="font-black ${corValor} text-sm">R$ ${valor.toFixed(2)}</p>
                        </div>
                        <div class="flex gap-2">
                            ${i.tipo === 'despesa' ? `
                                <button onclick="marcarPago(${i.id})" class="px-4 py-2 rounded-xl font-bold text-[10px] uppercase border ${i.riscado ? 'bg-zinc-800 border-zinc-700 text-zinc-500' : 'bg-emerald-500/10 border-emerald-500/20 text-emerald-500'}">
                                    ${i.riscado ? 'Pago ✓' : 'Pagar'}
                                </button>` : ''}
                            <button onclick="apagar(${i.id})" class="px-3 text-rose-500 font-black">✕</button>
                        </div>
                    </div>`;
            });

            const fmt = (n) => n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            // CÁLCULO: Saldo = Todas as Receitas - Apenas o que foi pago
            document.getElementById('saldo-total').innerText = fmt(receitasTotal - despesasPagas);
            document.getElementById('resumo-receitas').innerText = fmt(receitasTotal);
            document.getElementById('resumo-despesas').innerText = fmt(despesasTotal);
        }

        function prepararNovoMes() { if(confirm("Limpar tudo?")) { localStorage.removeItem('f_v13_at'); location.reload(); } }
    </script>
</body>
</html>
